# CodeForge AI - 快速启动配置
# 适用于单机部署和本地开发
# 使用方式: docker-compose -f docker-compose.quickstart.yml up -d

version: '3.8'

services:
  # ==================== 基础设施层 ====================

  mysql:
    image: mysql:8.0
    container_name: codeforge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: dango_ai_code
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/created_table.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codeforge-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123456}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: codeforge-nacos
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567}
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-security}
      NACOS_CORE_API_COMPATIBILITY_CONSOLE_ENABLED: true
      NACOS_CORE_API_COMPATIBILITY_SERVER_ENABLED: true
      NACOS_CORE_API_COMPATIBILITY_CLIENT_ENABLED: true
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:latest
    container_name: codeforge-higress
    environment:
      HIGRESS_CONSOLE_PASSWORD: ${HIGRESS_CONSOLE_PASSWORD:-admin123}
      TZ: Asia/Shanghai
      NACOS_SERVER_URL: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
    volumes:
      - higress-data:/data
    ports:
      - "8001:8001"  # Higress 控制台
      - "8080:8080"  # HTTP 网关
      - "8443:8443"  # HTTPS 网关
    depends_on:
      nacos:
        condition: service_healthy
    restart: unless-stopped

  # ==================== 业务服务层 ====================

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.user
      args:
        MODULE_PATH: user/user-service
    image: codeforge-user:latest
    container_name: codeforge-user-service
    environment:
      JAVA_OPTS: -Xmx384m -Xms192m
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: local
      NACOS_ADDR: nacos:8848
      NACOS_NAMESPACE: public
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: dango_ai_code
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
    volumes:
      - ./logs/user-service:/app/logs
    ports:
      - "8123:8123"
      - "50051:50051"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: unless-stopped

  app-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.app
      args:
        MODULE_PATH: app/app-service
    image: codeforge-app:latest
    container_name: codeforge-app-service
    environment:
      JAVA_OPTS: -Xmx1g -Xms512m
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: local
      NACOS_ADDR: nacos:8848
      NACOS_NAMESPACE: public
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: dango_ai_code
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      # AI 配置（需要在 Nacos 配置中心设置）
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
    volumes:
      - ./logs/app-service:/app/logs
      - ./app-data/code_output:/app/tmp/code_output
      - ./app-data/code_deploy:/app/tmp/code_deploy
    ports:
      - "8124:8124"
      - "50053:50053"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: unless-stopped

  screenshot-app:
    build:
      context: ./backend
      dockerfile: Dockerfile.screenshot
      args:
        MODULE_PATH: screenshot/screenshot-app
    image: codeforge-screenshot:latest
    container_name: codeforge-screenshot
    environment:
      JAVA_OPTS: -Xmx320m -Xms160m
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: local
      NACOS_ADDR: nacos:8848
      NACOS_NAMESPACE: public
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
    volumes:
      - ./logs/screenshot-app:/app/logs
    ports:
      - "8125:8125"
      - "50054:50054"
    depends_on:
      nacos:
        condition: service_healthy
    restart: unless-stopped

  supabase-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.supabase
      args:
        MODULE_PATH: supabase/supabase-service
    image: codeforge-supabase:latest
    container_name: codeforge-supabase
    environment:
      JAVA_OPTS: -Xmx320m -Xms160m
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: local
      NACOS_ADDR: nacos:8848
      NACOS_NAMESPACE: public
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: dango_ai_code
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
    volumes:
      - ./logs/supabase-service:/app/logs
    ports:
      - "8126:8126"
      - "50055:50055"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: codeforge-frontend:latest
    container_name: codeforge-frontend
    environment:
      TZ: Asia/Shanghai
      NGINX_BACKEND_URL: http://higress:8080
    ports:
      - "80:80"
    depends_on:
      - higress
      - app-service
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
  higress-data:

networks:
  default:
    name: codeforge-network
