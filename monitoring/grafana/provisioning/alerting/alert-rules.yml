apiVersion: 1

groups:
  - orgId: 1
    name: service-health
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: service-down
        title: 服务宕机
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up == 0
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务宕机: {{ $labels.job }}"
          description: "{{ $labels.job }} 已停止响应超过 1 分钟"

      - uid: jvm-memory-high
        title: JVM 堆内存过高
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.85]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 堆内存过高: {{ $labels.job }}"

  - orgId: 1
    name: http-performance
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: http-5xx-rate-high
        title: HTTP 5xx 错误率过高
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
                /
                sum(rate(http_server_requests_seconds_count[5m])) by (job)
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 5xx 错误率过高: {{ $labels.job }}"

      - uid: http-response-slow
        title: HTTP P95 响应时间过长
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP P95 响应时间过长: {{ $labels.job }}"

  - orgId: 1
    name: ai-monitoring
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: ai-error-rate-high
        title: AI 调用错误率过高
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(ai_model_errors_total[5m])) by (model_name)
                /
                sum(rate(ai_model_requests_total{status="success"}[5m])) by (model_name)
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.1]
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "AI 调用错误率过高: {{ $labels.model_name }}"

      - uid: ai-token-usage-spike
        title: AI Token 消耗异常飙升
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(ai_model_tokens_total{token_type="total"}[5m]))
                > 3 * sum(rate(ai_model_tokens_total{token_type="total"}[1h] offset 1h))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI Token 消耗异常飙升"

  - orgId: 1
    name: business-metrics
    folder: Business
    interval: 1h
    rules:
      - uid: no-new-users-24h
        title: 24小时无新用户注册
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: mysql-business
            model:
              rawSql: |
                SELECT COUNT(*) as value
                FROM `user`
                WHERE isDelete = 0
                  AND createTime >= NOW() - INTERVAL 24 HOUR
              format: table
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "过去 24 小时没有新用户注册"

      - uid: user-spike-alert
        title: 新增用户数异常飙升
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: mysql-business
            model:
              rawSql: |
                SELECT COUNT(*) as today_count
                FROM `user`
                WHERE isDelete = 0
                  AND createTime >= NOW() - INTERVAL 1 DAY
              format: table
              refId: A
          - refId: B
            relativeTimeRange:
              from: 604800
              to: 0
            datasourceUid: mysql-business
            model:
              rawSql: |
                SELECT COUNT(*) / 7 as avg_daily
                FROM `user`
                WHERE isDelete = 0
                  AND createTime >= NOW() - INTERVAL 7 DAY
              format: table
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > $B * 3"
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "今日新增用户数超过过去7天日均的3倍"
