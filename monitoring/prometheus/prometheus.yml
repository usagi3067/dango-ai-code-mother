global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # app-service (Machine A - 腾讯云)
  - job_name: "app-service"
    metrics_path: "/api/actuator/prometheus"
    scheme: http
    static_configs:
      - targets: ["42.194.244.5:8124"]
        labels:
          service: "app-service"
          machine: "machine-a"

  # user-service (Machine B - 百度云)
  - job_name: "user-service"
    metrics_path: "/api/actuator/prometheus"
    scheme: http
    static_configs:
      - targets: ["106.13.14.164:8123"]
        labels:
          service: "user-service"
          machine: "machine-b"

  # screenshot-app (Machine B - 百度云)
  - job_name: "screenshot-app"
    metrics_path: "/api/actuator/prometheus"
    scheme: http
    static_configs:
      - targets: ["106.13.14.164:8125"]
        labels:
          service: "screenshot-app"
          machine: "machine-b"

  # supabase-service (Machine B - 百度云)
  - job_name: "supabase-service"
    metrics_path: "/api/actuator/prometheus"
    scheme: http
    static_configs:
      - targets: ["106.13.14.164:8126"]
        labels:
          service: "supabase-service"
          machine: "machine-b"

  # cAdvisor - 腾讯云 CVM 容器指标
  - job_name: "cadvisor-tencent"
    scheme: http
    static_configs:
      - targets: ["42.194.244.5:8080"]
        labels:
          machine: "machine-a"
          cloud: "tencent"

  # cAdvisor - 百度云 BCC 容器指标
  - job_name: "cadvisor-baidu"
    scheme: http
    static_configs:
      - targets: ["106.13.14.164:9099"]
        labels:
          machine: "machine-b"
          cloud: "baidu"

  # Nacos (Machine B - 百度云)
  - job_name: "nacos"
    metrics_path: "/nacos/actuator/prometheus"
    scheme: http
    static_configs:
      - targets: ["106.13.14.164:8848"]
        labels:
          service: "nacos"
          machine: "machine-b"

  # 阿里云 RDS MySQL 指标
  - job_name: "mysqld"
    scheme: http
    static_configs:
      - targets: ["mysqld-exporter:9104"]

  # 阿里云 Redis 指标
  - job_name: "redis"
    scheme: http
    static_configs:
      - targets: ["redis-exporter:9121"]
