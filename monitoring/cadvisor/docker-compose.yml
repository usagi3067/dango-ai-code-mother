# cAdvisor 容器指标采集
# 在每台云主机上部署，采集 Docker 容器的 CPU/内存/网络/磁盘指标
#
# 部署方式:
#   scp docker-compose.yml root@<云主机IP>:/opt/cadvisor/docker-compose.yml
#   ssh root@<云主机IP> "cd /opt/cadvisor && docker compose up -d"
#
# 注意:
#   - 腾讯云 CVM: 使用 v0.49.1，端口 8080
#   - 百度云 BCC: 使用 v0.52.1（Docker 29.x 需要更新版本），端口 9099（8080 被 Higress 占用）
#     百度云 BCC 上的配置见服务器 /opt/cadvisor/docker-compose.yml

services:
  cadvisor:
    image: gcr.nju.edu.cn/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    mem_limit: 256m
