# NAS 监控栈
# 使用方式: docker compose up -d

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped
    mem_limit: 256m

  grafana:
    image: grafana/grafana:11.6.0
    env_file: .env
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: Asia/Shanghai
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "${SMTP_HOST}:${SMTP_PORT}"
      GF_SMTP_USER: "${SMTP_FROM}"
      GF_SMTP_PASSWORD: "${SMTP_AUTH_PASSWORD}"
      GF_SMTP_FROM_ADDRESS: "${SMTP_FROM}"
      GF_SMTP_FROM_NAME: "Grafana 监控"
      GF_SMTP_STARTTLS_POLICY: "NoStartTLS"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    mem_limit: 256m
    depends_on:
      - prometheus

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: mysqld-exporter
    volumes:
      - ./mysqld-exporter/.my.cnf:/cfg/.my.cnf:ro
    command:
      - "--config.my-cnf=/cfg/.my.cnf"
    ports:
      - "9104:9104"
    restart: unless-stopped
    mem_limit: 64m

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: redis-exporter
    env_file: .env
    environment:
      REDIS_ADDR: "${REDIS_HOST}:${REDIS_PORT}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "9121:9121"
    restart: unless-stopped
    mem_limit: 64m


volumes:
  prometheus-data:
  grafana-data:
