# Machine B（2核4G）- Nacos + Higress + 其他业务服务
# 部署路径: /opt/dango-ai-code-mother
# 使用方式: docker compose up -d

services:
  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: nacos
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      NACOS_CORE_API_COMPATIBILITY_CONSOLE_ENABLED: true
      NACOS_CORE_API_COMPATIBILITY_SERVER_ENABLED: true
      NACOS_CORE_API_COMPATIBILITY_CLIENT_ENABLED: true
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    volumes:
      - ./nacos/data:/home/nacos/data
      - ./nacos/logs:/home/nacos/logs
    ports:
      - "8848:8848"
      - "8858:8080"
      - "9848:9848"
    restart: unless-stopped
    mem_limit: 768m

  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:latest
    container_name: higress
    environment:
      HIGRESS_CONSOLE_PASSWORD: ${HIGRESS_CONSOLE_PASSWORD}
      TZ: Asia/Shanghai
      NACOS_SERVER_URL: ${NACOS_ADDR}
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
    volumes:
      - ./higress/data:/data
    ports:
      - "8001:8001"
      - "8080:8080"
      - "8443:8443"
    restart: unless-stopped
    mem_limit: 768m

  user-service:
    image: dango-ai-code-user:latest
    environment:
      JAVA_OPTS: -Xmx384m -Xms192m -javaagent:/app/skywalking-agent/skywalking-agent.jar -Dskywalking.agent.service_name=user-service -Dskywalking.agent.keep_tracing=true -Dskywalking.collector.backend_service=localhost:11800
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      NACOS_ADDR: ${NACOS_ADDR}
      NACOS_NAMESPACE: prod
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DUBBO_IP_TO_REGISTRY: ${MACHINE_B_IP}
    volumes:
      - ./logs/user-service:/app/logs/user-service
      - ./skywalking-agent:/app/skywalking-agent:ro
    ports:
      - "8123:8123"
      - "50051:50051"
    restart: "no"
    mem_limit: 768m

  screenshot-app:
    image: dango-ai-code-screenshot:latest
    environment:
      JAVA_OPTS: -Xmx320m -Xms160m -javaagent:/app/skywalking-agent/skywalking-agent.jar -Dskywalking.agent.service_name=screenshot-app -Dskywalking.agent.keep_tracing=true -Dskywalking.collector.backend_service=localhost:11800
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      NACOS_ADDR: ${NACOS_ADDR}
      NACOS_NAMESPACE: prod
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DUBBO_IP_TO_REGISTRY: ${MACHINE_B_IP}
    volumes:
      - ./logs/screenshot-app:/app/logs/screenshot-app
      - ./skywalking-agent:/app/skywalking-agent:ro
    ports:
      - "8125:8125"
      - "50054:50054"
    restart: "no"
    mem_limit: 640m

  supabase-service:
    image: dango-ai-code-supabase:latest
    environment:
      JAVA_OPTS: -Xmx320m -Xms160m -javaagent:/app/skywalking-agent/skywalking-agent.jar -Dskywalking.agent.service_name=supabase-service -Dskywalking.agent.keep_tracing=true -Dskywalking.collector.backend_service=localhost:11800
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      NACOS_ADDR: ${NACOS_ADDR}
      NACOS_NAMESPACE: prod
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DUBBO_IP_TO_REGISTRY: ${MACHINE_B_IP}
    volumes:
      - ./logs/supabase-service:/app/logs/supabase-service
      - ./skywalking-agent:/app/skywalking-agent:ro
    ports:
      - "8126:8126"
      - "50055:50055"
    restart: "no"
    mem_limit: 640m

  frontend:
    build:
      context: ./frontend
    image: dango-ai-code-frontend:latest
    environment:
      TZ: Asia/Shanghai
      HIGRESS_ADDR: ${HIGRESS_ADDR}
    ports:
      - "80:80"
    restart: "no"
    mem_limit: 64m

  supabase-manager:
    build:
      context: ./supabase-manager
    image: dango-ai-code-supabase-manager:latest
    environment:
      TZ: Asia/Shanghai
      SUPABASE_MANAGEMENT_API_TOKEN: ${SUPABASE_MANAGEMENT_API_TOKEN}
    ports:
      - "3000:3000"
    restart: "no"
    mem_limit: 192m
